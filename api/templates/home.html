<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>RentWise NYC</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    </head>
  
    <body>
        <div class="container mt-5">
            <h2 class="text-center mb-4">RentWise NYC</h2>

            <div class="progress mb-4">
                <div id="progressBar" class="progress-bar" style="width: 25%"></div>
            </div>

            <form id="rentForm" class="card p-4">

                <div class="form-step active" id="step-1">
                    <h4>Background</h4>

                    <div class="mb-3">
                        <label class="form-label" for="zipCode">ZIP Code*</label>
                        <input type="text" pattern="[0-9]{5}" id="zipCode" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="yearBuilt">Year Built</label>
                        <input type="text" pattern="[0-9]{4}" id="yearBuilt" class="form-control">
                    </div>
                    
                    <button type="button" class="btn btn-primary next">Next</button>
                </div>

                <div class="form-step" id="step-2">
                    <h4>Size</h4>

                    <div class="mb-3">
                        <label class="form-label" for="bedrooms">Bedrooms*</label>
                        <input type="number" id="bedrooms" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="bathrooms">Bathrooms*</label>
                        <input type="number" step="0.5" id="bathrooms" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="squareFootage">Square Footage</label>
                        <input type="number" id="squareFootage" class="form-control">
                    </div>

                    <div class="d-flex justify-content-between">
                        <button type="button" class="btn btn-secondary prev">Back</button>
                        <button type="button" class="btn btn-primary next">Next</button>
                    </div>
                </div>

                <div class="form-step" id="step-3">
                    <h4>Price</h4>

                    <div class="mb-3">
                        <label class="form-label" for="rent">Rent*</label>
                        <input type="number" id="rent" class="form-control" required>
                    </div>

                    <div class="d-flex justify-content-between">
                        <button type="button" class="btn btn-secondary prev">Back</button>
                        <button type="submit" class="btn btn-success">Analyze</button>
                    </div>
                </div>

                <div class="form-step" id="step-4">
                    <h4>Results</h4>
                    <div id="resultsContent"></div>

                    <button type="button" class="btn btn-outline-primary mt-3" onclick="resetForm()">Analyze Another Listing</button>
                </div>

            </form>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <script src="{{ url_for('static', filename='app.js') }}"></script>
    </body>
</html>
